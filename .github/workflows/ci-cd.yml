    #   uses: appleboy/ssh-action@v1.0.0
    #   with:
    #     host: ${{ secrets.HOST }}
    #     username: ${{ secrets.USERNAME }}
    #     key: ${{ secrets.SSH_KEY }}
    #     script: |
    #       docker pull ${{ secrets.DOCKER_USERNAME }}/factory-employee-api:latest
    #       docker stop factory-api || true
    #       docker rm factory-api || true
    #       docker run -d --name factory-api -p 3000:3000 \
